openapi: 3.1.0
info:
  title: groundcontrol API
  version: 0.6.0
  description: |
    Launch and supervise Claude Code sessions from HTTP. Every action in the
    PWA is a route here; see docs/api.md for the human guide and cookbook.
    The unversioned /api/* paths are a deprecated alias of /api/v1 kept for
    one release.

    This reference is served live at /docs (Scalar), and the raw spec at
    /openapi.yaml — both unauthenticated, same as /healthz.

    ## The stuck-agent handoff

    The API is built so that an agent (a `claude -p` job, a CI harness, any
    automation) that hits a wall can hand its exact working state to a human
    and wait:

    1. `POST /sessions?wait=ready` with `folder` set to the agent's own
       working directory — one round-trip returns `pairingUrl`, a
       claude.ai link that opens a live session in that folder.
    2. Send the user that link ("I'm stuck on X — hop in here and I'll pick
       up when you're done").
    3. Poll `GET /sessions/{id}` (watch `activity` flip busy→idle and read
       `/transcript`), subscribe to `GET /events` (SSE), or register a
       `callbackUrl` — then resume when the human's work lands.
    4. `DELETE /sessions/{id}` when done.

    Agents spawned by this runner find their coordinates in the environment:
    `GROUNDCONTROL_URL` (this API's base URL) and `GROUNDCONTROL_JOB_ID` /
    `GROUNDCONTROL_SESSION_ID` (their own launch). Runner-managed worktree
    folders (under ~/.groundcontrol/worktrees) are always launchable, so a
    job can rescue itself in its own checkout. No credential is injected:
    spawned agents inherit the runner's environment, so export a scoped
    launch token there (or carry one in the prompt) if the API requires auth.
servers:
  - url: /api/v1

security:
  - bearer: []

tags:
  - name: Sessions
    description: >
      Spawn and supervise interactive claude remote-control environments —
      the pairing-link handoff lives here.
  - name: Jobs
    description: Headless claude -p runs — queue, poll, cancel.
  - name: Browse
    description: Folder roots, subfolders, and branches for picking a launch target.
  - name: Events
    description: Lifecycle event stream (SSE); webhooks share the same payload.
  - name: Worktrees
    description: Kept worktrees — dirty orphans the sweeps refused to delete.
  - name: Orbit
    description: Leftover gc/* session branches and their guarded cleanup.
  - name: Config
    description: Roots, webhooks, and launch presets.
  - name: Meta
    description: Health and service identity.

components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      description: >
        The authToken from config.json (full access), or a scoped entry from
        its tokens list (scopes: read, launch, admin — a valid token missing
        the route's scope gets 403 insufficient_scope). Also accepted as a
        ?token= query parameter (for <img> tags that cannot send headers);
        prefer the header.

  parameters:
    sessionId:
      name: id
      in: path
      required: true
      schema: { type: string }
    pathQuery:
      name: path
      in: query
      required: true
      schema: { type: string }
      description: Absolute path inside a configured root.

  responses:
    BadRequest:
      description: Invalid request (see error.code).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Token is valid but lacks the scope this route needs (insufficient_scope).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: No such session or job.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable machine-readable code — key off this, not message.
              enum:
                - unauthorized
                - insufficient_scope
                - invalid_json
                - missing_param
                - invalid_param
                - invalid_path
                - invalid_config
                - outside_roots
                - not_found
                - not_ready
                - ready_timeout
                - launch_failed
                - folder_in_use
                - session_live
                - job_live
                - worktree_error
                - branch_held
                - branch_not_merged
                - not_implemented
                - payload_too_large
            message:
              type: string

    Session:
      type: object
      required: [id, name, folder, spawnMode, branch, worktreePath, permissionMode, capacity, state, pairingUrl, callbackUrl, startedAt, exitedAt, exitCode, lastOutputAt, lastLine]
      properties:
        id: { type: string, description: 8-char launch id }
        name: { type: string }
        folder: { type: string }
        spawnMode: { type: string, enum: [same-dir, worktree] }
        branch: { type: [string, "null"] }
        worktreePath: { type: [string, "null"] }
        permissionMode: { type: string, description: "claude permission mode: default, acceptEdits, plan, auto, dontAsk, bypassPermissions" }
        capacity:
          type: integer
          description: >
            Resolved --capacity: how many sessions claude.ai can create in
            this environment. Always present — 32 (the CLI default) when the
            launch didn't ask.
        state:
          type: string
          enum: [starting, ready, exited, error]
          description: error means the process died before a pairing URL appeared.
        pairingUrl:
          type: [string, "null"]
          description: >
            The claude.ai link that opens this live environment — the "magic
            link" to hand a human (or scan via /sessions/{id}/qr). Null until
            state reaches ready; POST /sessions?wait=ready returns it in one
            round-trip.
          examples: ["https://claude.ai/remote/abc123"]
        callbackUrl: { type: [string, "null"], description: "Per-launch webhook: every lifecycle event except session.start is POSTed here." }
        startedAt: { type: string, format: date-time }
        exitedAt: { type: [string, "null"], format: date-time }
        exitCode: { type: [integer, "null"] }
        lastOutputAt: { type: [string, "null"], format: date-time }
        lastLine: { type: [string, "null"], description: "Last meaningful log line, ≤120 chars." }
        settingsSkipReason:
          type: string
          description: >
            Why a requested preset-settings injection didn't happen — one of
            "preset no longer exists", "settings file already exists",
            "in use by another session", "preset settings are not a JSON
            object", "preset settings exceed 64 KB", "preset settings carry a
            non-inert key", or "settings write failed". Present only when
            injection was requested but skipped; absent means injected or never
            requested (the wire never claims success, only explains
            absence).
        capacityUsed:
          type: integer
          description: >
            The environment's live session count, scraped from the CLI's own
            "Capacity: used/max" status line — preferred over registry-derived
            counts when present. Absent until the line first appears and after
            exit; never journaled.
        capacityMax:
          type: integer
          description: >
            Companion maximum from the same scrape; present exactly when
            capacityUsed is. Can disagree with capacity if the CLI's default
            drifts — the scrape wins on display surfaces.
        claudeSessionId:
          type: string
          description: >
            Claude Code's conversation UUID for the launch's primary session
            (the id claude --resume wants), captured from the CLI's agents
            registry. First capture wins; absent until captured. Journaled,
            so lost and landed objects also carry it after a runner restart.
        activity:
          type: string
          enum: [busy, idle]
          description: >
            Registry-sourced live activity. Absent when the registry hasn't
            confirmed it recently, reports an unknown value, or the session
            exited — never a stale value. Never journaled, never fanned out.
        environmentSessions:
          type: array
          items: { $ref: "#/components/schemas/ExtraSession" }
          description: >
            The environment's own live sessions — registry rows descended
            from the spawned launcher, primary session first, then by name.
            The primary row's status reads the same registry row as
            activity. Rows clear on the first successful poll that no
            longer lists them; the grace window applies only across failed
            polls, and rows keep their last confident classification while
            the process snapshot is unavailable. Absent when none.
        folderSessions:
          type: array
          items: { $ref: "#/components/schemas/ExtraSession" }
          description: >
            Live Claude sessions in the launch's directory that do not
            belong to the environment (manual, IDE), sorted by name — "in
            this folder" is the literal contract. Rows age out shortly
            after the registry stops listing them. Absent when none.
        prLink: { $ref: "#/components/schemas/PRLink" }
        debrief: { $ref: "#/components/schemas/Debrief" }

    ExtraSession:
      type: object
      description: >
        One live Claude session row, as listed under environmentSessions
        (the environment's own sessions, descendants of the spawned
        launcher) or folderSessions (unrelated same-folder sessions —
        manual, IDE).
      required: [name]
      properties:
        name: { type: string, description: Registry-assigned session name. }
        status:
          type: string
          enum: [busy, idle]
          description: Omitted when the registry reports anything else.

    PRLink:
      type: object
      description: >
        The newest pr-link record from the session's transcript. Best-effort
        enrichment of an undocumented transcript detail — absence is the
        contract, and it never appears on landed objects (no journaled
        source).
      required: [number, url]
      properties:
        number: { type: integer }
        url: { type: string }

    Debrief:
      type: object
      description: >
        Exit-time record of what a worktree session left behind, captured
        before the worktree is cleaned up. Absent for same-dir sessions, and
        (best-effort) whenever git failed at exit time. Diff stats are
        measured from the merge-base with the launch base, so upstream work
        merged into the worktree doesn't count as the run's own; uncommitted
        edits do count.
      required: [filesChanged, insertions, deletions, uncommitted, branchState]
      properties:
        filesChanged: { type: integer }
        insertions: { type: integer }
        deletions: { type: integer }
        uncommitted: { type: integer, description: "Paths with uncommitted changes (git status --porcelain) at exit." }
        branchState:
          type: string
          enum: [merged, in-orbit, worktree-kept]
          description: >
            merged — the gc/ branch is gone or its tip is reachable from the
            default branch; in-orbit — the branch survived with commits the
            default branch lacks; worktree-kept — the worktree was dirty and
            kept on disk, branch intact.

    LandedSession:
      type: object
      description: >
        A finished session reconstructed from its session.start/session.exit
        journal pair — debriefs that survive runner restarts. Sessions still
        listed under "sessions" (live, or exited but not yet dismissed) are
        excluded. Newest exits first, capped at 20, 7-day window, scoped to
        the configured roots.
      required: [id, name, folder, branch, spawnMode, permissionMode, startedAt, exitedAt, exitCode]
      properties:
        id: { type: string }
        name: { type: string }
        folder: { type: string }
        branch: { type: [string, "null"] }
        spawnMode: { type: string }
        permissionMode: { type: string }
        startedAt: { type: string, format: date-time }
        exitedAt: { type: string, format: date-time }
        exitCode: { type: [integer, "null"] }
        claudeSessionId:
          type: string
          description: >
            Claude conversation UUID, read from the session.exit journal
            entry; absent when it was never captured.
        debrief: { $ref: "#/components/schemas/Debrief" }

    CreateSession:
      type: object
      required: [folder]
      properties:
        folder: { type: string, description: Absolute path inside a configured root. }
        name: { type: string, description: Must not collide with a live session; omitted → auto-generated. }
        spawnMode: { type: string, enum: [same-dir, worktree], default: same-dir }
        branch:
          type: string
          description: >
            Required in worktree mode (base for the private gc/<id> branch).
            In same-dir mode, switches the checkout first; refused if dirty.
        permissionMode:
          type: string
          enum: [default, acceptEdits, plan, auto, dontAsk, bypassPermissions]
          default: default
          description: >
            Unknown values are a 400 invalid_param. dontAsk and
            bypassPermissions skip Claude Code's confirmation prompts
            entirely — a launch-scoped token grants that power.
        capacity:
          type: integer
          default: 32
          description: >
            Max sessions claude.ai can create in this environment
            (--capacity). Normalized, never rejected: absent or < 1 falls
            back to 32 (the CLI default), values above 256 clamp to 256.
            Passed to claude only when it differs from the default.
        presetName:
          type: string
          description: >
            Named preset to resolve: it fills only the options the request
            left empty (an explicit request field always wins) and supplies
            the settings JSON injected as <launch
            cwd>/.claude/settings.local.json for the session's lifetime. A
            name that no longer resolves is not an error — the launch
            proceeds without injection and the session carries
            settingsSkipReason "preset no longer exists". Recorded in the
            journal so recents and relaunch can re-resolve it.
        callbackUrl: { type: string, description: "http(s) URL — every lifecycle event for this launch except session.start is POSTed to it." }
        timeoutMs: { type: integer, default: 60000, minimum: 1000, maximum: 300000, description: "Only meaningful with ?wait=ready." }

    LifecycleEvent:
      type: object
      required: [event, at, title, message, data]
      properties:
        event: { type: string, description: "session.start | session.ready | session.exit | session.kill | job.start | job.exit" }
        at: { type: string, format: date-time }
        title: { type: string, description: Ready-made human summary line. }
        message: { type: string }
        data:
          type: object
          description: The full session object under a "session" key, or the job under a "job" key.

    Transcript:
      type: object
      properties:
        sessionId:
          type: string
          description: Claude Code's conversation id (not the runner's session id).
        updatedAt: { type: string, format: date-time }
        messages:
          type: array
          description: Last 200 messages; each message's text is capped at 4000 characters.
          items:
            type: object
            properties:
              role: { type: string, enum: [user, assistant] }
              text: { type: string, description: "Message text; tool calls appear as \"→ ToolName\" lines." }
              at: { type: string, format: date-time }

    WebhookConfig:
      type: object
      required: [url]
      properties:
        url: { type: string, description: http(s) URL that receives matching events as JSON POSTs. }
        events:
          type: array
          items: { type: string }
          description: >
            Filter tokens: exact names, prefix wildcards (session.*), "*" or
            omitted for everything, and the derived token session.failed.

    Preset:
      type: object
      required: [name]
      properties:
        name: { type: string, description: Unique and non-empty within the list. }
        permissionMode:
          type: string
          enum: [default, acceptEdits, plan, auto, dontAsk, bypassPermissions]
          description: Absent/empty means the launch default.
        spawnMode:
          type: string
          enum: [same-dir, worktree]
          description: Absent/empty means the launch default.
        capacity:
          type: integer
          minimum: 1
          maximum: 256
          description: Absent/0 means unset.
        settingsJson:
          type: string
          description: >
            Optional settings-file content as a string. At most 64 KB and
            must parse as a JSON object. Only inert top-level keys are allowed
            (an allowlist of display/model/UX toggles such as model, theme,
            verbose); any key that can run commands, move credentials, or
            change permissions — hooks, apiKeyHelper, statusLine, env,
            permissions, sandbox, and the like — is rejected (invalid_config
            at write time, or a "preset settings carry a non-inert key" skip
            at launch). Injected at launch as <launch
            cwd>/.claude/settings.local.json (marker-scoped: a
            "_groundcontrol" key brands the file with the owning launch, an
            existing unmarked file refuses injection, and removal waits for the
            last same-folder exit).

    Job:
      type: object
      required: [id, folder, prompt, spawnMode, branch, permissionMode, timeoutMs, callbackUrl, state, createdAt, startedAt, finishedAt, exitCode, result, costUsd, durationMs, numTurns, worktreePath]
      properties:
        id: { type: string }
        folder: { type: string }
        prompt: { type: string }
        spawnMode: { type: string, enum: [same-dir, worktree] }
        branch: { type: [string, "null"] }
        permissionMode: { type: string }
        timeoutMs: { type: integer }
        callbackUrl: { type: [string, "null"] }
        state: { type: string, enum: [queued, running, succeeded, failed, timeout, canceled] }
        createdAt: { type: string, format: date-time }
        startedAt: { type: [string, "null"], format: date-time }
        finishedAt: { type: [string, "null"], format: date-time }
        exitCode: { type: [integer, "null"] }
        result: { type: [string, "null"], description: "Claude's final text, or the launch/kill reason." }
        costUsd: { type: [number, "null"] }
        durationMs: { type: [integer, "null"] }
        numTurns: { type: [integer, "null"] }
        worktreePath: { type: [string, "null"] }

    CreateJob:
      type: object
      required: [folder, prompt]
      properties:
        folder: { type: string, description: Absolute path inside a configured root. }
        prompt: { type: string }
        spawnMode:
          type: string
          enum: [same-dir, worktree]
          description: Defaults to worktree for git folders — autonomous runs get a fresh checkout.
        branch: { type: string, description: Worktree base; defaults to the repo's current branch. }
        permissionMode: { type: string, default: acceptEdits, description: Real autonomy usually wants an explicit bypassPermissions. }
        timeoutMs: { type: integer, description: "Kill deadline; default from the jobs config key (15 min), max 2h." }
        callbackUrl: { type: string, description: POSTed the job.exit event on completion. }
        isolation: { type: boolean, description: "true is rejected with 501 not_implemented — jobs run as the runner's user." }
        docker: { type: boolean, description: "Alias for isolation; same 501." }

    FolderEntry:
      type: object
      required: [name, path, isGit, branch]
      properties:
        name: { type: string }
        path: { type: string }
        isGit: { type: boolean }
        branch: { type: [string, "null"] }

    BrowseResult:
      type: object
      required: [path, parent, isGit, repoRoot, repoName, branch, folders]
      properties:
        path: { type: string }
        parent: { type: [string, "null"], description: null at a configured root. }
        isGit: { type: boolean, description: "True when inside a repo, not only at its root." }
        repoRoot: { type: [string, "null"] }
        repoName: { type: [string, "null"] }
        branch: { type: [string, "null"] }
        folders:
          type: array
          items: { $ref: "#/components/schemas/FolderEntry" }

    RecentLaunch:
      type: object
      required: [folder, name, branch, spawnMode, permissionMode, capacity, at, stale]
      properties:
        folder: { type: string }
        name: { type: string }
        branch: { type: [string, "null"] }
        spawnMode: { type: string }
        permissionMode: { type: string }
        capacity: { type: integer, description: "Defaults to 32 for entries journaled before capacity existed." }
        presetName: { type: string, description: Absent when the launch didn't come from a preset. }
        at: { type: string, format: date-time }
        stale: { type: boolean, description: The launch's branch no longer exists. }

    LostSession:
      allOf:
        - $ref: "#/components/schemas/RecentLaunch"
        - type: object
          required: [id]
          properties:
            id: { type: string }
            claudeSessionId:
              type: string
              description: >
                Claude conversation UUID from the session.claude-id journal
                entry — the resume handle for a session a crashed runner
                forgot. Absent when it was never captured.

    KeptWorktree:
      type: object
      required: [path, repo, id, branch, dirty]
      properties:
        path: { type: string }
        repo: { type: string }
        id: { type: string }
        branch: { type: [string, "null"] }
        dirty: { type: boolean }

    OrbitBranch:
      type: object
      description: >
        One leftover gc/* session branch ("in orbit"). Branches checked out
        by a live session are never listed. heldBy names the worktree (a
        kept dirty one) that still has the branch checked out — clean that
        up via DELETE /worktrees instead of the branch sweep.
      required: [repo, branch, merged, lastCommitAt]
      properties:
        repo: { type: string, description: Repo root the branch lives in. }
        branch: { type: string, description: Always gc/*. }
        merged:
          type: boolean
          description: >
            The branch tip is reachable from the repo's default branch
            (origin's declared HEAD, else local main, else master; a repo
            with no default reads everything as unmerged).
        lastCommitAt: { type: string, format: date-time }
        heldBy: { type: string, description: Worktree path that has the branch checked out; absent when unattached. }

    ConfigView:
      type: object
      required: [roots, showHidden, webhooks, presets]
      properties:
        roots:
          type: array
          items: { type: string }
        showHidden: { type: boolean }
        webhooks:
          type: array
          items: { $ref: "#/components/schemas/WebhookConfig" }
        presets:
          type: array
          items: { $ref: "#/components/schemas/Preset" }

paths:
  /roots:
    get:
      operationId: listRoots
      tags: [Browse]
      summary: List configured browse roots
      responses:
        "200":
          description: Roots with git badge and current branch.
          content:
            application/json:
              schema:
                type: object
                required: [roots]
                properties:
                  roots:
                    type: array
                    items: { $ref: "#/components/schemas/FolderEntry" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /browse:
    get:
      operationId: browseFolder
      tags: [Browse]
      summary: Browse a folder
      parameters:
        - $ref: "#/components/parameters/pathQuery"
      responses:
        "200":
          description: Subfolders plus the repo context of the folder itself.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BrowseResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /branches:
    get:
      operationId: listBranches
      tags: [Browse]
      summary: List branches for the repo containing a path
      description: Local and remote-tracking refs deduped to plain names, newest commit first.
      parameters:
        - $ref: "#/components/parameters/pathQuery"
      responses:
        "200":
          description: Branch names; empty for non-git folders.
          content:
            application/json:
              schema:
                type: object
                required: [branches]
                properties:
                  branches:
                    type: array
                    items: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /config:
    get:
      operationId: getConfig
      tags: [Config]
      summary: Read config
      responses:
        "200":
          description: Current config.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigView" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    put:
      operationId: updateConfig
      tags: [Config]
      summary: Update config (partial)
      description: >
        Any subset of roots, showHidden, webhooks, presets. Only keys present
        in the body are touched — an omitted key keeps its current value, an
        explicit empty array clears the list. Validation runs before anything
        is applied. Persists to config.json. A token that can reach this
        route can widen roots — treat it as root on the box.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roots:
                  type: array
                  items: { type: string }
                showHidden: { type: boolean }
                webhooks:
                  type: array
                  items: { $ref: "#/components/schemas/WebhookConfig" }
                presets:
                  type: array
                  items: { $ref: "#/components/schemas/Preset" }
      responses:
        "200":
          description: Applied and persisted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /worktrees:
    get:
      operationId: listWorktrees
      tags: [Worktrees]
      summary: List kept worktrees
      description: Dirty orphans the cleanup sweeps refused to delete.
      responses:
        "200":
          description: Kept worktrees.
          content:
            application/json:
              schema:
                type: object
                required: [worktrees]
                properties:
                  worktrees:
                    type: array
                    items: { $ref: "#/components/schemas/KeptWorktree" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      operationId: removeWorktree
      tags: [Worktrees]
      summary: Force-remove a kept worktree
      description: Merged gc/* session branches are deleted; unmerged ones kept.
      parameters:
        - $ref: "#/components/parameters/pathQuery"
      responses:
        "200":
          description: Removed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /orbit:
    get:
      operationId: listOrbitBranches
      tags: [Orbit]
      summary: List leftover gc/* session branches
      description: >
        Scans the distinct repos named by recent session.start journal
        entries (folders resolved to their repo root, deduped, scoped to the
        configured roots). Repos absent from the journal's read window (last
        2000 entries) aren't scanned — a recents-driven view, not an
        archive.
      responses:
        "200":
          description: Branches in orbit, most recently used repos first.
          content:
            application/json:
              schema:
                type: object
                required: [orbit]
                properties:
                  orbit:
                    type: array
                    items: { $ref: "#/components/schemas/OrbitBranch" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      operationId: sweepOrbitBranch
      tags: [Orbit]
      summary: Safe-delete a gc/* session branch
      description: >
        Always git branch -d — there is no force parameter; unmerged
        branches must be merged (or their holding worktree cleaned via
        DELETE /worktrees) first. Non-gc/* names are rejected
        (invalid_param) before any git work; the repo must be inside the
        roots, exist, and be a git repo (invalid_path). A successful sweep
        writes an orbit.swept journal entry.
      parameters:
        - name: repo
          in: query
          required: true
          schema: { type: string }
          description: Repo root, inside a configured root.
        - name: branch
          in: query
          required: true
          schema: { type: string }
          description: The gc/* branch to delete.
      responses:
        "200":
          description: Swept.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: "not_found: no such gc/ branch in that repo."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: "branch_held: checked out by a live session or a kept worktree — or branch_not_merged: git's safe delete found unmerged commits; merge the work first. A transient git failure (timeout, index lock) is a 500 worktree_error, not this."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /sessions:
    get:
      operationId: listSessions
      tags: [Sessions]
      summary: List sessions
      responses:
        "200":
          description: Live sessions plus journal-derived lost headstones and landed debriefs.
          content:
            application/json:
              schema:
                type: object
                required: [sessions, lost, landed]
                properties:
                  sessions:
                    type: array
                    items: { $ref: "#/components/schemas/Session" }
                  lost:
                    type: array
                    items: { $ref: "#/components/schemas/LostSession" }
                  landed:
                    type: array
                    items: { $ref: "#/components/schemas/LandedSession" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createSession
      tags: [Sessions]
      summary: Spawn an agent session
      description: >
        Spawns claude remote-control in the folder (or a fresh worktree).
        Returns immediately with state "starting"; poll GET /sessions/{id}
        until state is "ready" and pairingUrl is set — or pass ?wait=ready
        to block until then and get the pairing URL in one round-trip.
      parameters:
        - name: wait
          in: query
          schema: { type: string, enum: [ready] }
          description: Block until the session pairs, dies, or timeoutMs passes.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSession" }
      responses:
        "201":
          description: Session created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: "launch_failed: duplicate live name, unknown branch, dirty checkout, worktree failure — or, with ?wait=ready, the process died before pairing. folder_in_use: a same-dir launch into a folder that already has a live environment (one live environment per folder; use worktree mode for a second)."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "504":
          description: "ready_timeout: ?wait=ready deadline passed; the session is still starting — poll GET /sessions/{id}."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [Sessions]
      summary: Inspect a session
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: The session.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: killSession
      tags: [Sessions]
      summary: Kill a session
      description: SIGTERM to the PTY; the worktree is cleaned on exit (kept if dirty).
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: The session as of the kill.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /sessions/{id}/qr:
    get:
      operationId: getSessionQr
      tags: [Sessions]
      summary: Pairing QR (SVG)
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: QR code for the pairing URL.
          content:
            image/svg+xml:
              schema: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: "not_ready: session has no pairing URL yet."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /sessions/{id}/log:
    get:
      operationId: getSessionLog
      tags: [Sessions]
      summary: Runtime log tail
      description: Last ~400 output chunks, ANSI-stripped, as plain text.
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: Log text.
          content:
            text/plain:
              schema: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /sessions/{id}/transcript:
    get:
      operationId: getSessionTranscript
      tags: [Sessions]
      summary: Conversation transcripts
      description: >
        The actual conversations of this launch — user prompts and assistant
        replies (tool calls compressed to their names), parsed from the JSONL
        transcripts Claude Code writes for the session's working directory.
        Sessions added from the phone inside the same launch share that
        directory, so all of their conversations appear here.
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: Transcripts, oldest first (empty until the first prompt).
          content:
            application/json:
              schema:
                type: object
                properties:
                  transcripts:
                    type: array
                    items: { $ref: "#/components/schemas/Transcript" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /sessions/{id}/record:
    delete:
      operationId: dismissSession
      tags: [Sessions]
      summary: Dismiss a dead or lost session
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: Dismissed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: "session_live: still running — kill it first."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /events:
    get:
      operationId: streamEvents
      tags: [Events]
      summary: Lifecycle event stream (SSE)
      description: >
        Server-sent events: one message per lifecycle event (LifecycleEvent as
        JSON in the data field, event name in the event field), plus a ping
        every 25 seconds. No replay — re-list sessions after reconnecting.
        EventSource clients authenticate with ?token=.
      responses:
        "200":
          description: text/event-stream held open.
          content:
            text/event-stream:
              schema: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /jobs:
    get:
      operationId: listJobs
      tags: [Jobs]
      summary: List jobs
      responses:
        "200":
          description: All jobs this runner knows, newest first.
          content:
            application/json:
              schema:
                type: object
                required: [jobs]
                properties:
                  jobs:
                    type: array
                    items: { $ref: "#/components/schemas/Job" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createJob
      tags: [Jobs]
      summary: Queue a headless job
      description: >
        Runs claude -p <prompt> --output-format json to completion — no PTY,
        no pairing, no human. FIFO queue, bounded concurrency (default 2).
        isolation/docker set to true is rejected with 501 not_implemented.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateJob" }
      responses:
        "202":
          description: Queued (or already running if a slot was free).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: "launch_failed: not a git repo in worktree mode, or detached with no branch given."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "501":
          description: "not_implemented: Docker isolation requested."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [Jobs]
      summary: Inspect a job
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: The job with result, cost, duration, turns once finished.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: cancelJob
      tags: [Jobs]
      summary: Cancel a job
      description: Dequeues a queued job, kills a running one's whole process group; a no-op on finished jobs.
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: The job as of the cancel.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /jobs/{id}/log:
    get:
      operationId: getJobLog
      tags: [Jobs]
      summary: Job log (raw stdout+stderr)
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: Log text.
          content:
            text/plain:
              schema: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /jobs/{id}/record:
    delete:
      operationId: dismissJob
      tags: [Jobs]
      summary: Drop a finished job from the list
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: Dropped.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: "job_live: still queued or running — cancel it first."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /journal/recent:
    get:
      operationId: listRecentLaunches
      tags: [Sessions]
      summary: Recent launch configs
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 20, default: 5 }
      responses:
        "200":
          description: Distinct recent launches, newest first.
          content:
            application/json:
              schema:
                type: object
                required: [recent]
                properties:
                  recent:
                    type: array
                    items: { $ref: "#/components/schemas/RecentLaunch" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /healthz:
    servers:
      - url: /
        description: Served at the server root, outside the /api/v1 prefix.
    get:
      operationId: getHealth
      tags: [Meta]
      summary: Liveness probe
      description: >
        Unauthenticated by design (uptime probes), like GET /docs and
        GET /openapi.yaml. sessions counts ready sessions only.
      security: []
      responses:
        "200":
          description: The runner is up.
          content:
            application/json:
              schema:
                type: object
                required: [ok, version, sessions]
                properties:
                  ok: { type: boolean }
                  version: { type: string }
                  sessions: { type: integer, description: Live sessions currently in the ready state. }
