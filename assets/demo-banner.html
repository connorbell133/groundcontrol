<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ground·control — demo banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:   #f2eee3;
    --ink:     #1c1a14;
    --verm:    #d8451f;
    --verm-d:  #b23414;
    --green:   #2e7d43;
    --muted:   #6b6555;
    --faint:   #8a8371;
    --card:    #faf7ee;
    --panel:   #fffdf6;
  }

  * { box-sizing: border-box; }

  html, body { overflow: hidden; }

  body {
    margin: 0;
    width: 1400px;
    height: 520px;
    background: var(--paper);
    color: var(--ink);
    position: relative;
    font-family: "IBM Plex Mono", monospace;
    -webkit-font-smoothing: antialiased;
  }

  /* graph-paper grid, faded toward edges */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(28,26,20,0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(28,26,20,0.12) 1px, transparent 1px);
    background-size: 30px 30px;
    -webkit-mask-image: radial-gradient(ellipse 75% 85% at 42% 45%, rgba(0,0,0,0.55), transparent 100%);
    mask-image: radial-gradient(ellipse 75% 85% at 42% 45%, rgba(0,0,0,0.55), transparent 100%);
    pointer-events: none;
  }

  /* faint vermillion glow behind the screen */
  .glow {
    position: absolute;
    right: -60px;
    top: -80px;
    width: 620px;
    height: 620px;
    background: radial-gradient(circle at center, rgba(216,69,31,0.10), transparent 62%);
    pointer-events: none;
  }

  /* ---------- left: the claim ---------- */

  .claim {
    position: absolute;
    left: 76px;
    top: 50%;
    transform: translateY(-50%);
    width: 720px;
  }

  .kicker {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--verm-d);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 26px;
  }
  .kicker .tick {
    width: 9px;
    height: 9px;
    background: var(--verm);
    display: inline-block;
  }
  .kicker .rule {
    flex: 0 0 64px;
    height: 1px;
    background: rgba(28,26,20,0.28);
  }

  h1 {
    font-family: "Instrument Serif", serif;
    font-weight: 400;
    font-size: 55px;
    line-height: 1.14;
    margin: 0 0 30px 0;
    letter-spacing: 0.002em;
  }
  h1 .old {
    color: var(--muted);
  }
  h1 .old em {
    font-style: italic;
    color: var(--ink);
  }
  h1 .new em {
    font-style: italic;
    color: var(--verm);
  }
  .wordmark .dot { color: var(--verm); }

  .trust {
    font-size: 13.5px;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .trust .sep {
    color: var(--verm);
    padding: 0 7px;
  }

  /* ---------- right: the paused frame ---------- */

  .screen {
    position: absolute;
    right: 76px;
    top: 50%;
    transform: translateY(-50%);
    width: 448px;
    height: 388px;
    background: var(--ink);
    border-radius: 14px;
    box-shadow: 0 2px 0 rgba(28,26,20,0.25), 0 18px 44px -18px rgba(28,26,20,0.45);
    overflow: hidden;
  }

  /* ghost of the old ritual, paused mid-frame */
  .ghost {
    position: absolute;
    left: 30px;
    top: 30px;
    font-size: 13px;
    line-height: 2.05;
    color: var(--green);
    white-space: pre;
  }
  .ghost .l1 { opacity: 0.50; }
  .ghost .l2 { opacity: 0.38; }
  .ghost .l3 { opacity: 0.28; }
  .ghost .l4 { opacity: 0.18; }
  .ghost .cursor {
    display: inline-block;
    width: 8px;
    height: 15px;
    background: var(--green);
    opacity: 0.45;
    vertical-align: -2px;
    margin-left: 2px;
  }

  /* dim wash so the play button owns the frame */
  .screen .wash {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 46%, rgba(28,26,20,0) 30%, rgba(28,26,20,0.55) 100%);
  }

  .play {
    position: absolute;
    left: 50%;
    top: 46%;
    transform: translate(-50%, -50%);
    width: 112px;
    height: 112px;
    border-radius: 50%;
    background: var(--verm);
    box-shadow: 0 0 0 8px rgba(216,69,31,0.18), 0 10px 26px -8px rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .play .tri {
    width: 0;
    height: 0;
    border-top: 21px solid transparent;
    border-bottom: 21px solid transparent;
    border-left: 34px solid var(--panel);
    margin-left: 9px;
  }

  /* timecode bar */
  .timebar {
    position: absolute;
    left: 26px;
    right: 26px;
    bottom: 24px;
  }
  .timebar .track {
    height: 3px;
    background: rgba(250,247,238,0.22);
    border-radius: 2px;
    position: relative;
    margin-bottom: 11px;
  }
  .timebar .track .head {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translate(-2px, -50%);
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--verm);
  }
  .timebar .readout {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: rgba(250,247,238,0.75);
  }
  .timebar .readout .hd { color: rgba(250,247,238,0.45); }

  /* vermillion viewfinder brackets framing the screen */
  .bracket {
    position: absolute;
    width: 26px;
    height: 26px;
    border: 0 solid var(--verm);
    pointer-events: none;
  }
  .bracket.tl { left: -14px;  top: -14px;    border-left-width: 3px;  border-top-width: 3px; }
  .bracket.tr { right: -14px; top: -14px;    border-right-width: 3px; border-top-width: 3px; }
  .bracket.bl { left: -14px;  bottom: -14px; border-left-width: 3px;  border-bottom-width: 3px; }
  .bracket.br { right: -14px; bottom: -14px; border-right-width: 3px; border-bottom-width: 3px; }

  /* frame that carries the brackets (so they sit outside the ink rect) */
  .viewfinder {
    position: absolute;
    right: 76px;
    top: 50%;
    transform: translateY(-50%);
    width: 448px;
    height: 388px;
    pointer-events: none;
  }

  /* ---------- rubber stamp ---------- */

  .stamp {
    position: absolute;
    right: 560px;
    top: 40px;
    transform: rotate(-4deg);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--green);
    border: 1.5px solid var(--green);
    border-radius: 6px;
    padding: 8px 14px;
    background: #fffdf6;
    z-index: 5;
  }
</style>
</head>
<body>

  <div class="grid"></div>
  <div class="glow"></div>

  <div class="claim">
    <div class="kicker">
      <span class="tick"></span>
      90-second demo
      <span class="rule"></span>
    </div>
    <h1>
      <span class="old">The SSH ritual: <em>a minute</em> of typing.</span><br>
      <span class="new"><span class="wordmark">ground<span class="dot">&middot;</span>control</span>: <em>two taps and a scan.</em></span>
    </h1>
    <div class="trust">
      self-hosted<span class="sep">&middot;</span>4 deps<span class="sep">&middot;</span>no build step<span class="sep">&middot;</span>your tailnet only
    </div>
  </div>

  <div class="screen">
    <div class="ghost"><span class="l1">$ ssh devbox</span>
<span class="l2">$ cd ~/repos/app</span>
<span class="l3">$ git worktree add ../app-fix</span>
<span class="l4">$ claude remote-control</span><span class="cursor"></span></div>
    <div class="wash"></div>
    <div class="play"><div class="tri"></div></div>
    <div class="timebar">
      <div class="track"><div class="head"></div></div>
      <div class="readout">
        <span>&#9654;&nbsp; 0:00 / 1:30</span>
        <span class="hd">HD</span>
      </div>
    </div>
  </div>

  <div class="viewfinder">
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>
  </div>

  <div class="stamp">Demo &mdash; coming with v1</div>

</body>
</html>
